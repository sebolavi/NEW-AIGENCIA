<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ai.genciA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES — identiques horloge originale ── */
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --dark: #080C12;
  --dark2: #0D1420;
  --dark3: #131C2E;
  --border: rgba(201,168,76,0.15);
  --text: #E8DCC8;
  --muted: #6A7A8A;
  --hand-hour:   #C9A84C;
  --hand-minute: #C9A84C;
  --hand-second: #8B6914;
  --agency-primary: #C9A84C;
  --agency-bg:      #080C12;
  --agency-text:    #E8DCC8;
  --agency-muted:   #6A7A8A;
  --green: #2ECC71;
}
* { margin:0; padding:0; box-sizing:border-box; }

/* ── PAGE — tout tenir en 100vh ── */
body {
  background: var(--agency-bg);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* ── HEADER : titre + sous-titre + hook ── */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 0 24px;
  margin-bottom: 0;
}
.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 7vw, 68px);
  line-height: 1;
  color: var(--agency-text);
  letter-spacing: 1px;
}
.wordmark .a { color: var(--agency-primary); transition: color 0.6s; }
.wordmark .i { color: var(--agency-primary); transition: color 0.6s; }
.sub {
  font-family: 'DM Mono', monospace;
  font-size: clamp(13px, 1.8vw, 17px);
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--agency-primary);
  opacity: 0.85;
  margin-top: 10px;
}
.hook {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(20px, 3.5vw, 36px);
  font-style: italic;
  font-weight: 300;
  color: var(--agency-text);
  opacity: 0.75;
  text-align: center;
  line-height: 1.35;
  margin-top: 4px;
  margin-bottom: -10px;
}
.hook em { color: var(--agency-primary); font-style: italic; opacity: 1; transition: color 0.6s; }

/* ── LOGO UPLOAD — invisible sauf hover ── */
.logo-upload-area {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  padding-top: 12px;
  z-index: 10;
}
.logo-upload-btn {
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--agency-muted); opacity: 0; cursor: pointer;
  background: none; border: none; font-family: 'DM Mono', monospace;
  transition: opacity 0.2s; padding: 4px 8px;
}
.logo-upload-area:hover .logo-upload-btn { opacity: 0.5; }
#logo-img { max-height: 48px; max-width: 200px; object-fit: contain; display: none; }
#logo-file-input { display: none; }
.reset-btn {
  font-size: 8px; letter-spacing: 1px; color: var(--agency-muted);
  background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace;
  text-transform: uppercase; opacity: 0.4; display: none;
}
.reset-btn:hover { opacity: 1; color: var(--agency-primary); }
.color-notif {
  font-size: 9px; color: var(--green);
  display: none; align-items: center; gap: 6px;
}

/* ── HORLOGE — wrapper seul, tout le reste vient du JS original ── */
.clock-wrapper {
  flex-shrink: 0;
}

/* CSS HORLOGE — copie exacte never-sleeping-clock.html, rien changé ── */
.team-circle-section {
  position: relative;
  padding: 0 40px;
  overflow: visible;
}
.team-circle-wrap {
  position: relative;
  width: min(640px, 88vw);
  height: min(640px, 88vw);
  margin: 0 auto;
}
.team-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: rgba(8,12,18,0.95);
  border: 1.5px solid var(--gold);
  box-shadow: 0 0 0 6px rgba(201,168,76,0.05), 0 4px 28px rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px;
}
.team-center-word {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; text-align: center;
  line-height: 1; letter-spacing: 1.5px; text-transform: uppercase;
}
.team-center-word.w1 { font-size: 10px; color: var(--text); opacity: 0.5; }
.team-center-word.w2 { font-size: 16px; color: var(--gold); font-style: italic; text-transform: none; letter-spacing: 0.5px; }
.team-center-word.w3 { font-size: 10px; color: var(--text); opacity: 0.5; }
.clock-hand {
  position: absolute;
  bottom: 0; left: 50%;
  transform-origin: bottom center;
  border-radius: 4px 4px 0 0;
}
.clock-hand-hour   { width: 3px; margin-left: -1.5px; background: var(--hand-hour); opacity: 0.95; }
.clock-hand-hour::before {
  content: ''; position: absolute;
  top: -12px; left: 50%; transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-bottom: 12px solid var(--hand-hour);
}
.clock-hand-minute { width: 2px; margin-left: -1px; background: var(--hand-minute); opacity: 0.7; }
.clock-hand-minute::before {
  content: ''; position: absolute;
  top: -11px; left: 50%; transform: translateX(-50%);
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-bottom: 11px solid var(--hand-minute); opacity: 0.7;
}
.clock-hand-second { width: 1.5px; margin-left: -0.75px; background: var(--hand-second); opacity: 1; border-radius: 2px; }
.team-bubble {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
  transition: transform 0.25s;
}
.team-bubble:hover .bubble-tooltip { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
.team-bubble:hover .bubble-avatar  { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 3px var(--gold); }
.bubble-avatar {
  border-radius: 50%;
  background: var(--dark3);
  border: 2.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.15);
  transition: box-shadow 0.2s;
}
.bubble-name {
  font-family: 'Cormorant Garamond', serif;
  color: var(--hand-hour); font-weight: 700;
  margin-top: 8px; text-align: center; white-space: nowrap;
  font-size: 26px;
}
.bubble-tooltip {
  position: absolute;
  bottom: calc(100% + 14px);
  left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 16px; width: 220px;
  font-size: 11px; color: var(--muted); line-height: 1.8; font-style: italic;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 20;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  text-align: center;
}
.bubble-tooltip strong {
  display: block; font-style: normal;
  color: var(--gold); font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 4px;
}
.bubble-tooltip .bubble-title {
  display: block; font-style: normal;
  color: var(--text); font-size: 10px;
  letter-spacing: 0.5px; margin-bottom: 6px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
}
.bubble-tooltip::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: var(--border);
}

/* ── FOOTER ── */
.footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 0 24px;
}
.btn-go {
  width: 100%;
  max-width: 420px;
  padding: 18px 24px;
  background: transparent;
  border: 1.5px solid var(--agency-primary);
  border-radius: 4px;
  color: var(--agency-primary);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.25s;
  text-decoration: none;
}
.btn-go:hover { background: rgba(201,168,76,0.08); letter-spacing: 4px; }
.signature {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; font-style: italic;
  color: var(--agency-muted); opacity: 0.4; letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- Logo upload discret en haut -->
<div class="logo-upload-area">
  <img id="logo-img" src="" alt="">
  <label class="logo-upload-btn" onclick="document.getElementById('logo-file-input').click()">↑ importer logo</label>
  <button class="reset-btn" id="reset-btn" onclick="resetLogo()">✕</button>
  <div class="color-notif" id="color-notif"></div>
  <input type="file" id="logo-file-input" accept="image/*" onchange="handleLogo(this)">
</div>

<!-- Header -->
<div class="header">
  <div class="wordmark"><span class="a">A</span><span class="i">i</span>.genc.<span class="i">i</span><span class="a">A</span></div>
  <div class="sub">bali demo</div>
  <div class="hook">Votre villa ne dort <em>jamais.</em> Votre agent non plus.</div>
</div>

<!-- Horloge — HTML copie exacte never-sleeping-clock.html -->
<div class="clock-wrapper">
  <div class="team-circle-section">
    <div class="team-circle-wrap" id="team-circle-wrap">
      <div class="team-center">
        <div class="team-center-word w1">Never</div>
        <div class="team-center-word w2">Sleeping</div>
        <div class="team-center-word w3">Staff</div>
      </div>
      <div id="clock-hands-wrap" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;z-index:1;pointer-events:none;">
        <div class="clock-hand clock-hand-hour"   id="hand-h"></div>
        <div class="clock-hand clock-hand-minute" id="hand-m"></div>
        <div class="clock-hand clock-hand-second" id="hand-s"></div>
      </div>
      <div id="team-bubbles"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <a class="btn-go" href="choose-mode.html">Go Démo →</a>
  <div class="signature">developed by le petit manitou</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// JS MOTEUR — copie exacte never-sleeping-clock.html
// NE JAMAIS MODIFIER
// ═══════════════════════════════════════════════════════
const TEAM_MEMBERS = [
  { emoji:'📞', name:'Sofia',  title:'Guest Experience · 47 langues',    note:"Ne demande pas à télétravailler depuis Canggu. Elle y est déjà." },
  { emoji:'📈', name:'Rex',    title:'Dynamic Pricing · AirROI',          note:"N'a jamais dit 'laissons le prix tranquille cette semaine'." },
  { emoji:'🎬', name:'Léa',    title:'Content & Listing · Algo Airbnb',   note:"A une opinion très forte sur les photos de salle de bain. Elle a raison." },
  { emoji:'🛎️', name:'Marco',  title:'Concierge & Upsell',                note:"Connaît tous les bons restaurants de Seminyak. Sans commission cachée." },
  { emoji:'📊', name:'Yuki',   title:'Reporting · Lundi 8h',              note:"N'a jamais oublié un lundi. N'a jamais embelli un chiffre." },
  { emoji:'🔧', name:'Adi',    title:'Ops & Escalade · WhatsApp',         note:"Sait tout ce qui se passe. Intervient seulement quand c'est nécessaire." },
  { emoji:'🧾', name:'Nora',   title:'Financial Controller · P&L',        note:"Sait exactement combien coûte chaque rouleau de papier toilette. Et elle vous le dit." },
];

var orbitAngleOffset  = 0;
var orbitSpeed        = 0.00008;
var orbitSpeedTarget  = 0.00008;
var orbitSpeedCurrent = 0.00008;
var lastOrbitTime     = null;
var isSpinning        = false;
var spinEndTime       = null;

function renderTeamCircle(angleOffset) {
  const container = document.getElementById('team-bubbles');
  const wrap      = document.getElementById('team-circle-wrap');
  if (!container || !wrap) return;
  const n          = TEAM_MEMBERS.length;
  const wrapSize   = wrap.offsetWidth || 600;
  const radius     = wrapSize * 0.34;
  const bubbleSize = Math.round(wrapSize * 0.13);
  const fontSize   = Math.round(bubbleSize * 0.38);
  const labelW     = bubbleSize + 70;
  const offsetRad  = 25 * Math.PI / 180;

  container.innerHTML = '';
  TEAM_MEMBERS.forEach((m, i) => {
    const baseAngle = (2 * Math.PI * i / n) - Math.PI / 2 + offsetRad;
    const angle     = baseAngle - angleOffset;
    const cx        = wrapSize / 2 + radius * Math.cos(angle);
    const cy        = wrapSize / 2 + radius * Math.sin(angle);
    const bubble    = document.createElement('div');
    bubble.className = 'team-bubble';
    bubble.style.cssText = `left:${cx - labelW/2}px;top:${cy - bubbleSize/2}px;width:${labelW}px;`;
    const isBottom   = cy > wrapSize * 0.55;
    const tooltipPos = isBottom ? 'top:calc(100% + 12px);bottom:auto;' : 'bottom:calc(100% + 12px);top:auto;';
    const arrowStyle = isBottom
      ? 'bottom:100%;border-bottom:6px solid rgba(201,168,76,0.15);border-top:none;border-left:6px solid transparent;border-right:6px solid transparent;'
      : 'top:100%;border-top:6px solid rgba(201,168,76,0.15);border-bottom:none;border-left:6px solid transparent;border-right:6px solid transparent;';
    bubble.innerHTML = `
      <div class="bubble-avatar" style="width:${bubbleSize}px;height:${bubbleSize}px;margin:0 auto;">
        <span style="font-size:${fontSize}px">${m.emoji}</span>
      </div>
      <div class="bubble-name">${m.name}</div>
      <div class="bubble-tooltip" style="position:absolute;left:50%;width:220px;transform:translateX(-50%) translateY(6px);${tooltipPos}">
        <strong>${m.name}</strong>
        <span class="bubble-title">${m.title}</span>
        ${m.note}
        <span style="position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;${arrowStyle}"></span>
      </div>
    `;
    bubble.addEventListener('click', onOrbitClick);
    container.appendChild(bubble);
  });
}

function onOrbitClick() {
  if (isSpinning) return;
  isSpinning       = true;
  spinEndTime      = performance.now() + 2200;
  orbitSpeedTarget = 0.0012;
}

function setHandSizes() {
  const wrap = document.getElementById('team-circle-wrap');
  if (!wrap) return;
  const wrapSize = wrap.offsetWidth;
  const radius   = wrapSize * 0.34;
  const bubbleR  = Math.round(wrapSize * 0.065);
  const safeMax  = radius - bubbleR - 12;
  const hh = document.getElementById('hand-h');
  const hm = document.getElementById('hand-m');
  const hs = document.getElementById('hand-s');
  if (hs) hs.style.height = `${safeMax * 0.97}px`;
  if (hm) hm.style.height = `${safeMax * 0.97}px`;
  if (hh) hh.style.height = `${safeMax * 0.65}px`;
}

function tickClock() {
  const now = new Date();
  const h   = now.getHours() % 12;
  const m   = now.getMinutes();
  const s   = now.getSeconds();
  const ms  = now.getMilliseconds();
  const hDeg = (h / 12) * 360 + (m / 60) * 30;
  const mDeg = (m / 60) * 360 + (s / 60) * 6;
  const sDeg = (s / 60) * 360 + (ms / 1000) * 6;
  const hh = document.getElementById('hand-h');
  const hm = document.getElementById('hand-m');
  const hs = document.getElementById('hand-s');
  if (hh) hh.style.transform = `rotate(${hDeg}deg)`;
  if (hm) hm.style.transform = `rotate(${mDeg}deg)`;
  if (hs) hs.style.transform = `rotate(${sDeg}deg)`;
  requestAnimationFrame(tickClock);
}

function orbitLoop(ts) {
  if (lastOrbitTime === null) lastOrbitTime = ts;
  const dt = ts - lastOrbitTime;
  lastOrbitTime = ts;
  if (isSpinning) {
    orbitSpeedCurrent += (orbitSpeedTarget - orbitSpeedCurrent) * 0.06;
    if (ts > spinEndTime) { isSpinning = false; orbitSpeedTarget = orbitSpeed; }
  } else {
    orbitSpeedCurrent += (orbitSpeed - orbitSpeedCurrent) * 0.03;
  }
  orbitAngleOffset += orbitSpeedCurrent * dt;
  renderTeamCircle(orbitAngleOffset);
  requestAnimationFrame(orbitLoop);
}

renderTeamCircle(0);
setTimeout(() => { setHandSizes(); tickClock(); requestAnimationFrame(orbitLoop); }, 80);
window.addEventListener('resize', () => { setHandSizes(); });

// ═══════════════════════════════════════════════════════
// LOGO UPLOAD + EXTRACTION COULEUR
// ═══════════════════════════════════════════════════════
let logoDataUrl = null;

function handleLogo(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoDataUrl = e.target.result;
    document.getElementById('logo-img').src = logoDataUrl;
    document.getElementById('logo-img').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'block';
    analyzeLogoColors(logoDataUrl);
  };
  reader.readAsDataURL(file);
}

function resetLogo() {
  logoDataUrl = null;
  document.getElementById('logo-img').src = '';
  document.getElementById('logo-img').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('color-notif').style.display = 'none';
  applyTheme('#C9A84C', '#080C12');
}

function analyzeLogoColors(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 80; canvas.height = 80;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 80, 80);
    const data = ctx.getImageData(0, 0, 80, 80).data;
    const corners = [];
    for (let y=0;y<10;y++) for (let x=0;x<10;x++) {
      [[x,y],[79-x,y],[x,79-y],[79-x,79-y]].forEach(([px,py])=>{
        const i=(py*80+px)*4;
        if(data[i+3]>150) corners.push([data[i],data[i+1],data[i+2]]);
      });
    }
    const avgBg = corners.length
      ? corners.reduce((a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]]).map(v=>Math.round(v/corners.length))
      : [8,12,18];
    const bgHex = '#'+avgBg.map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
    const cmap = {};
    for (let i=0;i<data.length;i+=4) {
      const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
      if(a<80) continue;
      const bright=(r+g+b)/3;
      if(bright>225||bright<20) continue;
      const sat=Math.max(r,g,b)-Math.min(r,g,b);
      if(sat<35) continue;
      const diff=Math.abs(r-avgBg[0])+Math.abs(g-avgBg[1])+Math.abs(b-avgBg[2]);
      if(diff<60) continue;
      const key=`${Math.round(r/25)*25},${Math.round(g/25)*25},${Math.round(b/25)*25}`;
      cmap[key]=(cmap[key]||0)+1;
    }
    let maxC=0,bestKey=null;
    for(const [k,v] of Object.entries(cmap)){if(v>maxC){maxC=v;bestKey=k;}}
    let accent='#C9A84C';
    if(bestKey){const[r,g,b]=bestKey.split(',').map(Number);accent='#'+[r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');}
    applyTheme(accent, bgHex);
    const notif = document.getElementById('color-notif');
    notif.innerHTML = `<span style="width:8px;height:8px;border-radius:2px;background:${accent};display:inline-block"></span> couleur extraite`;
    notif.style.display = 'flex';
    setTimeout(()=>notif.style.display='none', 3500);
  };
  img.src = dataUrl;
}

function applyTheme(accent, bg) {
  const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
  const isLight = (r+g+b)/3 > 160;
  const s = (k,v) => document.documentElement.style.setProperty(k,v);
  document.body.style.background = bg;
  s('--agency-bg', bg);
  s('--agency-primary', accent); s('--gold', accent);
  s('--hand-hour', accent); s('--hand-minute', accent);
  s('--agency-text',  isLight ? '#111' : '#E8DCC8');
  s('--text',         isLight ? '#111' : '#E8DCC8');
  s('--agency-muted', isLight ? '#555' : '#6A7A8A');
  s('--muted',        isLight ? '#555' : '#6A7A8A');
  s('--dark2',        isLight ? '#f0ece4' : '#0D1420');
  s('--dark3',        isLight ? '#e8e2d8' : '#131C2E');
  s('--border',       isLight ? 'rgba(0,0,0,0.12)' : 'rgba(201,168,76,0.15)');
}
</script>
</body>
