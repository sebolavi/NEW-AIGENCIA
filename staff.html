<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Staff · Hidden Keys</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDF2F7;--bg2:#E2EBF4;--dark:#1A1E2E;--dark2:#1E2438;--dark3:#0D1020;
  --muted:#6A7A9A;--green:#27AE60;--green-soft:#E8F5EE;--green-dark:#1E8449;
  --gold:#C9A84C;--gold-light:#E8C97A;--orange:#E67E22;--orange-soft:#FEF0E3;
  --red:#C0392B;--blue:#2980B9;--blue-soft:#EBF5FB;--blue-mid:#5DADE2;--blue-dark:#1A5F8A;
  --rose:#FDF0F6;--rose-btn:#D4749A;--rose-dark:#A84870;
  --border:rgba(0,0,0,.08);--shadow:0 2px 14px rgba(0,0,0,.09);--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--dark);font-family:"Nunito",sans-serif;min-height:100vh;max-width:430px;margin:0 auto;}

/* ── SELECTION ── */
#screen-select{display:flex;flex-direction:column;min-height:100vh;}
.sel-hero{background:linear-gradient(160deg,var(--dark2),var(--dark3));padding:44px 24px 32px;text-align:center;}
.sel-sofia{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(201,168,76,.06));border:2px solid rgba(201,168,76,.45);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px;}
.sel-brand{font-family:"DM Mono",monospace;font-size:9px;color:var(--gold-light);letter-spacing:3px;margin-bottom:20px;}
.sel-title{font-size:28px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:8px;}
.sel-title em{color:var(--gold);font-style:italic;font-family:"Playfair Display",serif;font-size:30px;font-weight:400;}
.sel-sub{font-size:13px;color:rgba(255,255,255,.38);line-height:1.7;}
.sel-body{padding:22px 18px 48px;flex:1;}
.sel-lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.role-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;border:2.5px solid transparent;transition:all .18s;position:relative;overflow:hidden;}
.role-card:active{transform:scale(.96);}
.role-card.sel{border-color:var(--rc);}
.rc-bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--rc);transform:scaleX(0);transition:transform .2s;}
.role-card.sel .rc-bar{transform:scaleX(1);}
.role-av{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,0,0,.08);background:var(--bg2);flex-shrink:0;}
.role-av img{width:100%;height:100%;object-fit:cover;display:block;}
.role-name{font-size:13px;font-weight:800;color:var(--dark);}
.role-sub{font-size:10px;color:var(--muted);text-align:center;line-height:1.4;}
.sel-confirm{padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;border:none;width:100%;font-family:"Nunito",sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:none;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 16px rgba(41,128,185,.35);margin-bottom:12px;}
.sel-confirm.show{display:flex;}
.sel-note{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;font-style:italic;}
</style>
</head>
<body>

<div id="screen-select">
  <div class="sel-hero">
    <div class="sel-sofia">✨</div>
    <div class="sel-brand">SOFIA · HIDDEN KEYS</div>
    <div class="sel-title">Welcome to<br><em>your app.</em> 👋</div>
    <div class="sel-sub">Who are you today?<br>We'll remember you next time.</div>
  </div>
  <div class="sel-body">
    <div class="sel-lbl">Choose your role</div>
    <div class="role-grid" id="role-grid"></div>
    <button class="sel-confirm" id="sel-confirm" onclick="confirmRole()">✨ This is me — let's go</button>
    <div class="sel-note">Tap your name at the top to switch anytime.</div>
  </div>
</div>

  gardener: {name:"Wayan Arta",   sub:"Plants & outdoor",      accent:"#27AE60"},
  tukang:   {name:"Nyoman Budi",  sub:"Repairs & maintenance", accent:"#E67E22"},
  massage:  {name:"Ayu Dewi",     sub:"In-villa sessions",     accent:"#D4749A"},
  cooker:   {name:"Kadek Raka",   sub:"Breakfast & meals",     accent:"#C9A84C"},
  internet: {name:"Komang Adi",   sub:"Wi-Fi & tech support",  accent:"#00A693"}
};

var ROLE_LIST = ["manager","driver","cleaner","poolman","gardener","tukang","massage","cooker","internet"];
var selectedRole = null;

// Build grid
(function(){
  var grid = document.getElementById("role-grid");
  ROLE_LIST.forEach(function(k){
    var R = ROLES[k];
    var isMgr = (k==="manager");
    var card = document.createElement("div");
    card.className = "role-card";
    card.style.setProperty("--rc", R.accent);
    if(isMgr){
      card.style.gridColumn="1 / -1";
      card.style.flexDirection="row";
      card.style.justifyContent="flex-start";
      card.style.padding="16px 18px";
      card.style.gap="14px";
      card.style.background="rgba(139,105,20,.06)";
      card.style.border="2px solid rgba(139,105,20,.25)";
      card.style.borderRadius="14px";
    }
    var imgSrc = LOGOS[k] || "";
    var avSize = isMgr ? "width:56px;height:56px;" : "";
    var nameHtml = isMgr
      ? R.name + ' <span style="font-size:10px;opacity:.55;font-weight:600;">· Manager</span>'
      : R.name.split(" ")[0];
    card.innerHTML =
      '<div class="rc-bar"></div>' +
      '<div class="role-av" style="'+avSize+'"><img src="' + imgSrc + '" alt=""></div>' +
      (isMgr
        ? '<div><div class="role-name" style="font-size:15px;">'+nameHtml+'</div><div class="role-sub">'+R.sub+'</div></div>'
        : '<div class="role-name">'+nameHtml+'</div><div class="role-sub">'+R.sub+'</div>'
      );
    card.onclick = function(){
      document.querySelectorAll(".role-card").forEach(function(c){c.classList.remove("sel");});
      card.classList.add("sel");
      selectedRole = k;
      document.getElementById("sel-confirm").classList.add("show");
    };
    grid.appendChild(card);
  });
})();

function confirmRole(){
  if(!selectedRole) return;
  try{localStorage.setItem("hk_role", selectedRole);}catch(e){}
  go(selectedRole);
}

function go(who){
  if(PAGE_MAP[who]){
    window.location.href = PAGE_MAP[who];
  } else {
    // Rôle sans page dédiée → message
    alert("Page " + who + " coming soon!");
  }
}

// Auto-redirect si rôle mémorisé
window.addEventListener("DOMContentLoaded", function(){
  var saved = null;
  try{saved = localStorage.getItem("hk_role");}catch(e){}
  if(saved && ROLES[saved]){
    // pré-sélectionner mais ne pas auto-redirect (laisser choisir)
    var cards = document.querySelectorAll(".role-card");
    var idx = ROLE_LIST.indexOf(saved);
    if(idx >= 0 && cards[idx]){
      cards[idx].click();
    }
  }
});
</script>
</body>
</html>
