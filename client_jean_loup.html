<!DOCTYPE html>
<html lang="fr">

<meta charset="UTF-8">

<title>Dashboard — Jean-Loup · Hidden Keys</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root{
  --gold:#8B6914;--gold-light:#C9A84C;
  --cream:#F5F0E8;--cream2:#EDE8DC;
  --border:rgba(139,105,20,0.18);
  --text:#1A1208;--muted:#6B5B3E;
  --green:#2ECC71;--green-d:#1A7A3C;
  --blue:#3498DB;--blue-d:#1A5A8A;
  --violet:#6B2D8B;--orange:#B7590A;
  --red:#CD5C5C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--text);font-family:"DM Mono",monospace;min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--cream2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.hk-logo{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:11px;font-weight:700;color:var(--cream);cursor:pointer;}
.t-sep{width:1px;height:18px;background:var(--border);}
.topbar-title{font-family:"Playfair Display",serif;font-size:19px;font-weight:700;}
.topbar-center{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;position:absolute;left:50%;transform:translateX(-50%);}
.proprio-bubble{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;background:var(--cream2);}
.proprio-name{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

/* PAGE */
.page{max-width:1440px;margin:0 auto;padding:20px 24px 80px;}
.section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.block-wrap{margin-bottom:36px;}
.fade-in{opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;}
.fade-in.visible{opacity:1;transform:none;}

/* ═══ VUE ENSEMBLE — 3 colonnes égales, identique nav-block villa_light ═══ */
.vue-ensemble{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;background:var(--cream);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:28px;min-height:320px;}
.ve-col{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ve-col-alerts{padding:16px 14px;background:var(--cream2);border-right:1px solid var(--border);justify-content:flex-start;overflow-y:auto;align-items:stretch;}
.ve-col-orbit{padding:10px 0;}
.ve-col-map{padding:0;background:var(--cream);border-left:1px solid var(--border);}
.ve-map-inner{width:100%;height:100%;}
#client-map{width:100%;height:100%;min-height:300px;}
.ve-head{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ve-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.alert-item{padding:5px 8px;border-radius:6px;font-size:10px;margin-bottom:4px;display:flex;justify-content:space-between;gap:6px;}
.a-red{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.25);color:#7B241C;}
.a-orange{background:rgba(183,89,10,.1);border:1px solid rgba(183,89,10,.25);color:#784212;}
.a-villa{font-size:8px;color:var(--muted);white-space:nowrap;}
.all-green{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:6px;color:var(--green-d);}
.ag-icon{font-size:28px;}
.ag-label{font-size:10px;letter-spacing:1px;color:var(--green-d);}
#orbit-canvas{display:block;margin:0 auto;}
.orbit-legend-mini{padding:8px 12px;border-top:1px solid var(--border);width:100%;font-size:9px;color:var(--muted);line-height:2;}

/* ═══ VILLA BLOCKS ═══ */
.villa-block{display:flex;align-items:stretch;margin-bottom:8px;border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
.villa-block:hover{box-shadow:0 3px 14px rgba(0,0,0,.1);}
.villa-block.st-green{border:1.5px solid var(--green);}
.villa-block.st-orange{border:1.5px solid #F39C12;}
.villa-block.st-red{border:1.5px solid #E74C3C;}
.vb-photo{width:90px;flex-shrink:0;background-size:cover;background-position:center;background-color:var(--cream2);}
.vb-info{width:180px;flex-shrink:0;background:var(--cream2);border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-evenly;padding:10px 12px;overflow:hidden;}
.vb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;}
.vb-name{font-family:"Playfair Display",serif;font-size:14px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vb-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.vb-occ-block{text-align:right;flex-shrink:0;}
.vb-occ-val{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--blue);line-height:1;}
.vb-occ-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.vb-nums{display:flex;align-items:baseline;gap:6px;flex-wrap:nowrap;}
.vb-net{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--green-d);line-height:1;white-space:nowrap;}
.vb-adr{font-size:10px;color:var(--gold);font-family:"DM Mono",monospace;margin-top:2px;letter-spacing:.5px;}
.vb-forecast{font-family:"Playfair Display",serif;font-size:17px;color:var(--blue);line-height:1;white-space:nowrap;}
.vb-timeline{flex:1;display:flex;background:var(--cream2);padding:4px;gap:2px;min-width:0;align-items:flex-start;}
.day-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.day-cell{width:100%;aspect-ratio:1;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.day-dname{font-size:6px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.4);line-height:1;text-transform:uppercase;}
.day-num{font-size:9px;font-weight:700;color:rgba(255,255,255,.95);text-shadow:0 1px 2px rgba(0,0,0,.4);line-height:1;}
.dc-done{background:#1A7A4A;}
.dc-missed{background:#E88080;}
.dc-booked{background:#2ECC71;border:1px solid rgba(26,122,74,.4);}
.dc-available{background:#1A5276;border:1px solid rgba(26,82,118,.8);}
.dc-lastmin{background:#7C3AED;}
@keyframes blink-lm{0%,100%{opacity:1;}50%{opacity:.3;}}
.blink-lm{animation:blink-lm 1.1s infinite;}
@keyframes pulse-today{0%,100%{box-shadow:0 0 0 2px rgba(139,105,20,.9);}50%{box-shadow:0 0 0 4px rgba(139,105,20,.2);}}
.dc-today{animation:pulse-today 1.6s infinite;z-index:5;}
.vb-sep{color:var(--muted);font-size:14px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px;padding:10px 0;border-top:1px solid var(--border);}
.leg-i{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-s{width:13px;height:13px;border-radius:3px;flex-shrink:0;}

/* ═══ KPIs COLLAPSIBLE ═══ */
.kpi-section{margin-bottom:28px;}
.kpi-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:10px 14px;background:var(--cream2);border:1px solid var(--border);border-radius:8px;transition:background .15s;}
.kpi-toggle:hover{background:rgba(139,105,20,.08);}
.kpi-toggle-icon{font-size:12px;transition:transform .2s;color:var(--muted);}
.kpi-toggle-icon.open{transform:rotate(180deg);}
.kpi-toggle-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.kpi-toggle-summary{flex:1;text-align:right;font-size:11px;color:var(--muted);}
.kpi-body{overflow:hidden;transition:max-height .3s ease;max-height:0;}
.kpi-body.open{max-height:200px;}
.hero-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:12px;}
.hero-kpi{background:var(--cream2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.hero-kpi-val{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;line-height:1;}
.hero-kpi-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.hero-kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── Injecter dans les pages qui utilisent les noms originaux ──
   Appeler HK_inject() après avoir chargé hk-data.js
   Les pages qui ont déjà leurs propres VILLAS/BOOKINGS_DB peuvent
   appeler HK_inject() pour les écraser avec les vraies données. */
function HK_inject(){
  if(typeof BOOKINGS_DB !== 'undefined'){
    // Merge : garder les clés existantes comme fallback, écraser avec HK
    Object.assign(BOOKINGS_DB, HK_BOOKINGS_DB);
  }
  if(typeof VILLAS !== 'undefined' && Array.isArray(VILLAS)){
    // Remplacer chaque villa par les données HK si même id
    HK_VILLAS.forEach(function(hv){
      var idx = VILLAS.findIndex(function(v){ return v.id === hv.id; });
      if(idx >= 0){
        // Merge : garder les champs locaux non présents dans HK (photo, etc.)
        VILLAS[idx] = Object.assign({}, VILLAS[idx], hv);
      } else {
        VILLAS.push(hv);
      }
    });
  }
}

/* ═══ buildDaysFromDB — identique villa_light ═══ */
function buildDaysFromDB(villa_id, year, month, n_days, isCurrent){
  var key=year+"-"+(month<10?"0":"")+month;
  var db=BOOKINGS_DB[villa_id]&&BOOKINGS_DB[villa_id][key];
  if(!db) return {days:Array(30).fill("available"),guests:Array(30).fill(null)};
  var days=[],guests=[];
  for(var i=0;i<n_days;i++){
    var dayN=i+1;
    var gname=db.days[i]||null;
    var gkey=db.keys[i]||null;
    var st;
    if(isCurrent){
      st = dayN<=TODAY_DAY ? (gname?"done":"missed") : (gname?"booked":"available");
    } else {
      st = gname ? "done" : "missed";
    }
    days.push(st);
    guests.push(gname?{name:gname,key:gkey}:null);
  }
  return{days:days,guests:guests};
}

/* ═══ calcMonthStats — identique villa_light ═══ */
function calcMonthStats(villa_id, adr){
  var aprData=buildDaysFromDB(villa_id,2026,4,30,true);
  var done=0,booked=0;
  aprData.days.forEach(function(s){
    if(s==="done")done++;
    else if(s==="booked")booked++;
  });
  return{
    net:done*adr,
    forecast:done*adr+booked*adr+(30-done-booked)*adr,
    occ:Math.round((done+booked)/30*100),
    done:done, booked:booked,
    days:aprData.days, guests:aprData.guests
  };
}

/* ═══ CURSEUR DATE ═══ */
function positionCursor(){
  var wrap=document.getElementById("cursor-wrap");
  var cur=document.getElementById("today-cursor");
  if(!wrap||!cur){return;}
  // Chercher les day-col dans toutes les villa-blocks — on positionne sur la première villa
  var allCols=wrap.querySelectorAll(".day-col");
  if(allCols.length<TODAY_DAY)return;
  // Colonnes de la première villa (30 cols par villa, 6 villas = 180 cols total)
  // On prend TODAY_DAY-1 dans la première villa
  var targetCol=allCols[TODAY_DAY-1];
  if(!targetCol)return;
  var cr=targetCol.getBoundingClientRect();
  var wr=wrap.getBoundingClientRect();
  var leftPx=cr.left-wr.left+cr.width/2;
  cur.style.display="block";
  cur.style.left=leftPx+"px";
  cur.style.height=wrap.scrollHeight+"px";
  var tl=document.getElementById("today-label");
  if(tl){
    var _d=new Date(_NOW.getFullYear(),_NOW.getMonth(),TODAY_DAY);
    var _DN=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
    tl.textContent=_DN[_d.getDay()]+" "+TODAY_DAY;
    tl.style.display="block";
    tl.style.left=leftPx+"px";
  }
}

  var maxBeds=Math.max.apply(null,VILLAS.map(function(v){return v.beds;}));

  // Orbit list — photo + couleur statut + info 2 lignes
  var lgHtml="";
  VILLAS.forEach(function(v){
    var s=v.stats;
    var img=getImg(v.imgVar);
    var dest=v._isHotel?"hotel.html?id=hotel":"villa_light.html?id="+v.id;
    var borderColor=s.occ>=70?"#1A7A4A":s.occ>=50?"#F39C12":"#E74C3C";
    var occColor=s.occ>=70?"#1A7A4A":s.occ>=50?"#F39C12":"#E74C3C";
    var subLabel=v._isHotel?v.loc+" · "+v.beds+" bung.":v.loc+" · "+v.beds+" ch.";
    var bookedLabel=s.booked>0?"<span style='color:#27AE60;font-weight:700;'>"+s.booked+" booké"+(s.booked>1?"s":"")+"</span>":"<span style='color:var(--muted);'>libre</span>";
    lgHtml+="<div onclick=\"window.location.href='"+dest+"'\" style='display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;'>"
      +"<div style='width:36px;height:36px;border-radius:6px;flex-shrink:0;border:2px solid "+borderColor+";background-size:cover;background-position:center;"+(img?"background-image:url("+img+");":"background:var(--cream2);")+";'></div>"
      +"<div style='flex:1;min-width:0;'>"
        +"<div style='font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'>"+v.name+"</div>"
        +"<div style='font-size:11px;color:var(--muted);'>"+subLabel+" · <span style='color:"+occColor+";font-weight:700;'>"+s.occ+"%</span> · "+bookedLabel+"</div>"
      +"</div>"
      +"</div>";
  });
  document.getElementById("orbit-list-wrap").innerHTML=lgHtml;

  function drawHand(cx,cy,angle,len,w,col){
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*len,cy+Math.sin(angle)*len);
    ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap="round";ctx.stroke();
  }

  function frame(){
    var now=new Date(),ms=now.getMilliseconds();
    var sec=now.getSeconds()+ms/1000,min=now.getMinutes()+sec/60,hr=(now.getHours()%12)+min/60;
    ctx.clearRect(0,0,size,size);
    // Orbite ring
    ctx.beginPath();ctx.arc(CX,CY,R_ORB,0,Math.PI*2);
    ctx.strokeStyle="rgba(139,105,20,.12)";ctx.lineWidth=0.8;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
    // Aiguilles
    drawHand(CX,CY,(hr/12)*Math.PI*2-Math.PI/2,R_C*.65,Math.round(size*.008),"rgba(201,168,76,.85)");
    drawHand(CX,CY,(min/60)*Math.PI*2-Math.PI/2,R_C*.82,Math.round(size*.005),"rgba(201,168,76,.65)");
    drawHand(CX,CY,(sec/60)*Math.PI*2-Math.PI/2,R_ORB*.56,1,"rgba(139,105,20,.8)");
    ctx.beginPath();ctx.arc(CX,CY,3,0,Math.PI*2);ctx.fillStyle="rgba(139,105,20,.9)";ctx.fill();
    // Bulles en orbite
    var angle=-(performance.now()/1000/130)*Math.PI*2;
    var _blinkOn=(Math.floor(performance.now()/600)%2===0);
    VILLAS.forEach(function(v,i){
      var a=(Math.PI/2)+i*(2*Math.PI/VILLAS.length)+angle;
      var bx=CX+Math.cos(a)*R_ORB,by=CY-Math.sin(a)*R_ORB;
      var beds=v._isHotel?10:v.beds;
      var r=R_C*0.35+(beds/maxBeds)*R_C*0.35;
      var occ=v.stats?v.stats.occ:68;
      var ringColor=occ>=70?"#1A7A4A":occ>=50?"#F39C12":"#E74C3C";
      if(v._isHotel) ringColor="#3498DB";
      var imgSrc=getImg(v.imgVar);
      // Fond
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
      ctx.fillStyle=v._isHotel?"#EBF5FB":"#EDE8DC";ctx.fill();
      // Photo
      if(imgSrc){
        var imgObj=v._imgObj||(v._imgObj=new Image());
        if(!imgObj.src)imgObj.src=imgSrc;
        if(imgObj.complete&&imgObj.naturalWidth>0){
          ctx.save();ctx.beginPath();ctx.arc(bx,by,r-1,0,Math.PI*2);ctx.clip();
          ctx.drawImage(imgObj,bx-(r-1),by-(r-1),(r-1)*2,(r-1)*2);ctx.restore();
        }
      }
      // Anneau
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
      ctx.strokeStyle=ringColor;ctx.lineWidth=2;ctx.stroke();
      // Label sans photo
      if(!imgSrc){
        var label=v._isHotel?"Sumba":v.name.replace("Villa ","").replace("Studio ","");
        ctx.font=Math.max(7,Math.round(r*.36))+"px 'DM Mono',monospace";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillStyle=v._isHotel?"#1A5A8A":"#6B5B3E";
        ctx.fillText(label,bx,by);
      }
      v._bx=bx;v._by=by;v._br=r;
    });
    // Centre Jean-Loup
    ctx.beginPath();ctx.arc(CX,CY,R_C,0,Math.PI*2);
    ctx.fillStyle="#EDE8DC";ctx.strokeStyle="rgba(139,105,20,.7)";ctx.lineWidth=1.8;ctx.fill();ctx.stroke();
    if(JEAN_LUC){
      var imgJL=window._jlImg||(window._jlImg=new Image());
      if(!imgJL.src)imgJL.src=JEAN_LUC;
      if(imgJL.complete&&imgJL.naturalWidth>0){
        ctx.save();ctx.beginPath();ctx.arc(CX,CY,R_C-2,0,Math.PI*2);ctx.clip();
        ctx.drawImage(imgJL,CX-(R_C-2),CY-(R_C-2),(R_C-2)*2,(R_C-2)*2);ctx.restore();
      }
    }
    ctx.font=Math.round(R_C*.19)+"px 'DM Mono',monospace";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle="rgba(139,105,20,.9)";
    ctx.fillText("Jean-Loup",CX,CY+R_C*.7);
    requestAnimationFrame(frame);
  }
  frame();

  // Click sur les bulles
  canvas.style.cursor="pointer";
  canvas.addEventListener("click",function(e){
    var rect=canvas.getBoundingClientRect();
    var mx=(e.clientX-rect.left)*(size/rect.width),my=(e.clientY-rect.top)*(size/rect.height);
    for(var i=0;i<VILLAS.length;i++){
      var v=VILLAS[i];if(!v._bx)continue;
      var dx=mx-v._bx,dy=my-v._by;
      if(Math.sqrt(dx*dx+dy*dy)<=v._br){
        window.location.href=v._isHotel?"hotel.html?id=hotel":"villa_light.html?id="+v.id;
        return;
      }
    }
  });
}

/* ═══ MAP ═══ */
function initMap(){
  var GPS={
    surya:    {lat:-8.6521, lng:115.1271},
    karma:    {lat:-8.6554, lng:115.1304},
    serenity: {lat:-8.6535, lng:115.1258},
    indah:    {lat:-8.6568, lng:115.1316},
    bulan:    {lat:-8.6586, lng:115.1289},
    hotel: {lat:-9.6600, lng:120.2700}  // Waingapu, Sumba
  };
  var map=L.map("client-map",{scrollWheelZoom:false,touchZoom:false,zoomControl:false});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:"© CartoDB",maxZoom:18}).addTo(map);
  var bounds=[];
  VILLAS.forEach(function(v){
    var pos=GPS[v.id]; if(!pos) return;
    bounds.push([pos.lat,pos.lng]);
    var occ=v.stats.occ;
    // Couleur cohérente avec l'orbite et les alertes
    var color = occ>=70 ? "#1A7A4A" : occ>=50 ? "#E67E22" : "#C0392B";
    var size = v._isHotel ? 16 : 11;
    var icon=L.divIcon({className:"",
      html:"<div style='width:"+size+"px;height:"+size+"px;border-radius:50%;background:"+color+";border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);'></div>",
      iconAnchor:[size/2,size/2]});
    var popup="<strong>"+v.name+"</strong><br>"+v.loc+"<br>"
      +(v._isHotel?"8 bungalows":v.beds+" ch.")+"<br>"
      +fmtK(v.stats.net)+" encaissé · "+v.stats.occ+"% occ.";
    L.marker([pos.lat,pos.lng],{icon:icon}).addTo(map).bindPopup(popup);
  });
  // Dezoom pour voir Bali + Sumba
  if(bounds.length) map.fitBounds(bounds,{padding:[20,20],maxZoom:8});
}

/* ══ TOGGLE ORBIT / LISTE ══ */
function setOrbitView(mode){
  var orbitWrap=document.getElementById("orbit-wrap");
  var listWrap=document.getElementById("orbit-list-wrap");
  var btnOrbit=document.getElementById("btn-orbit");
  var btnList=document.getElementById("btn-list");
  if(mode==="orbit"){
    if(orbitWrap)orbitWrap.style.display="flex";
    if(listWrap)listWrap.style.display="none";
    if(btnOrbit){btnOrbit.style.background="var(--gold)";btnOrbit.style.color="white";}
    if(btnList){btnList.style.background="none";btnList.style.color="var(--muted)";}
  } else {
    if(orbitWrap)orbitWrap.style.display="none";
    if(listWrap)listWrap.style.display="block";
    if(btnList){btnList.style.background="var(--gold)";btnList.style.color="white";}
    if(btnOrbit){btnOrbit.style.background="none";btnOrbit.style.color="var(--muted)";}
  }
}

/* ═══ INIT ═══ */
function init(){
  renderProprio();
  renderAlerts();
  renderHero();
  renderVillaBlocks();
  setTimeout(positionCursor, 80);
  setTimeout(initOrbit,350);
  if(typeof L!=="undefined") initMap();
  else{var s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";s.onload=initMap;document.head.appendChild(s);}
  setTimeout(function(){document.querySelectorAll(".fade-in").forEach(function(el){el.classList.add("visible");});},80);
}
init();
</script>
